<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pastel Firebase App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #ffffffcc;
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }

    h1 {
      color: #6a7fdc;
      margin-bottom: 15px;
    }

    input {
      padding: 10px;
      width: 90%;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
    }

    input:focus {
      border-color: #a6c1ee;
    }

    button {
      background: #a6c1ee;
      color: #fff;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    button:hover {
      background: #8eaef0;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🌸 Мой сайт</h1>

    <input type="text" id="name" placeholder="Имя">
    <input type="email" id="email" placeholder="Email">

    <button onclick="saveData()">Сохранить</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAFHk-knWEcXEoSjpk3WfdtbD2M0eU7DC4",
      authDomain: "meow-77104.firebaseapp.com",
      projectId: "meow-77104",
      storageBucket: "meow-77104.firebasestorage.app",
      messagingSenderId: "584355394282",
      appId: "1:584355394282:web:e6ce82386817cfae6ddd93"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.saveData = async function () {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;

      if (!name || !email) {
        alert("Заполни все поля!");
        return;
      }

      try {
        await addDoc(collection(db, "users"), {
          name: name,
          email: email,
          createdAt: new Date()
        });

        alert("Сохранено 🌸");
      } catch (e) {
        console.error(e);
        alert("Ошибка!");
      }
    };
  </script>

</body>
</html>
