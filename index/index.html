<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Панель управления данными</title>
<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #a18cd1, #fbc2eb);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px;
  min-height: 100vh;
  margin: 0;
}

.container {
  width: 100%;
  max-width: 500px;
  background: rgba(255,255,255,0.95);
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  text-align: center;
}

.container h3 {
  margin-bottom: 20px;
  color: #6a0dad;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #d3c0f0;
  border-radius: 8px;
  box-sizing: border-box;
  font-size: 14px;
}

input:focus {
  border-color: #a259ff;
  outline: none;
  box-shadow: 0 0 5px rgba(162,89,255,0.5);
}

button#mainBtn {
  background: #a259ff;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 8px;
  width: 100%;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  margin-top: 10px;
}

button#mainBtn:hover {
  background: #8629ff;
}

#feed {
  width: 100%;
  max-width: 500px;
  margin-top: 25px;
}

.post {
  background: rgba(255,255,255,0.9);
  border: 1px solid #e1c8f0;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
  position: relative;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  transition: transform 0.2s;
}

.post:hover {
  transform: translateY(-2px);
}

.like-btn {
  cursor: pointer;
  border: none;
  background: #f4e1ff;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 14px;
  transition: 0.25s;
}

.like-btn:hover {
  background: #d9b3ff;
}

.time {
  font-size: 11px;
  color: #888;
  float: right;
}
</style>
</head>
<body>

<div class="container">
  <h3>Панель управления данными</h3>
  <input type="text" id="name" placeholder="Имя профиля">
  <input type="email" id="email" placeholder="Рабочий Email">
  <button id="mainBtn">Опубликовать в облако</button>
</div>

<div id="feed"></div>

<script type="module">
// Подключение Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// ======= ВАШИ ДАННЫЕ FIREBASE =======
const firebaseConfig = {
      apiKey: "AIzaSyAFHk-knWEcXEoSjpk3WfdtbD2M0eU7DC4",
      authDomain: "meow-77104.firebaseapp.com",
      projectId: "meow-77104",
      storageBucket: "meow-77104.firebasestorage.app",
      messagingSenderId: "584355394282",
      appId: "1:584355394282:web:e6ce82386817cfae6ddd93"
    };
// ====================================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ======= Атомарное увеличение лайков =======
window.processLike = async (id) => {
  const docRef = doc(db, "requests", id);
  try {
    await updateDoc(docRef, { likes: increment(1) });
  } catch (e) {
    console.error("Ошибка при лайке:", e.message);
  }
};

// ======= Добавление нового запроса =======
document.getElementById("mainBtn").onclick = async () => {
  const btn = document.getElementById('mainBtn');
  btn.disabled = true;

  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();

  if(name.length <= 2 || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){
    alert("Введите корректное имя и email!");
    btn.disabled = false;
    return;
  }

  try {
    await addDoc(collection(db, "requests"), {
      name: name,
      email: email,
      likes: 0,
      timestamp: serverTimestamp()
    });
    document.getElementById('name').value = "";
    document.getElementById('email').value = "";
  } catch (e) {
    alert("Ошибка безопасности: данные отклонены сервером.");
  }

  btn.disabled = false;
};

// ======= Реактивная лента сообщений =======
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";
  snapshot.forEach((doc) => {
    const data = doc.data();
    feed.innerHTML += `
      <div class="post">
        <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || ""}</span>
        <b>${data.name}</b>
        <p>${data.email}</p>
        <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
      </div>
    `;
  });
});
</script>

</body>
</html>
